    <link rel="manifest" href="%BASE_URL%app.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%app-icon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1D4ED8" />

    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="application-name" content="Live Timetable" />
    <meta name="description" content="軽音ライブの出演順と進行をリアルタイムで管理するタイムテーブルアプリ" />
    <title>軽音ライブ タイムテーブル作成</title>
    <!-- GitHub Pages has no server-side routing, so /:circleId/public
         (see main.tsx) can only be reached on a fresh page load via the
         public/404.html redirect trick: that page bounces any unmatched
         path here with the intended path preserved as `?redirect=`. This
         decodes it back into a clean path (history.replaceState, so the
         address bar shows the real URL, not the redirect query) BEFORE
         main.tsx reads window.location.pathname to decide which route to
         render. A no-op locally (Vite's dev server serves index.html for
         any unmatched path itself, so `redirect` is never present) and a
         no-op for the normal editor URL (`/` or `/?room=...`), which never
         has this param either. -->
    <script>
      (function () {
        try {
          var params = new URLSearchParams(location.search);
          var redirect = params.get("redirect");
          if (redirect) {
            params.delete("redirect");
            var qs = params.toString();
            var newUrl = location.pathname + redirect + (qs ? "?" + qs : "") + location.hash;
            history.replaceState(null, "", newUrl);
          }
        } catch (err) {
          // Malformed query string — leave the URL as-is; main.tsx's route
          // match will simply fail and it'll fall back to the normal editor.
        }
      })();
    </script>
    <!-- Applies a manually-chosen theme (see useThemeStore.ts) BEFORE
         first paint, straight from localStorage — waiting for React/
         Zustand to hydrate first would show a flash of the wrong theme
         (system default, then a jump to the saved choice) on every load.
         "system" (the default, nothing chosen yet) intentionally sets no
         attribute at all, letting index.css's plain
         `@media (prefers-color-scheme)` rule apply with no JS involved. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("live-timetable-theme");
          var theme = raw ? JSON.parse(raw).state.theme : "system";
          if (theme === "light" || theme === "dark") {
            document.documentElement.setAttribute("data-theme", theme);
          }
        } catch (err) {
          // Storage inaccessible (private browsing, sandboxed iframe) or
          // malformed — falls back to the OS-preference media query,
          // never a crash before the app even loads.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
